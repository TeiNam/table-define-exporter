name: CI

on:
  push:
    # 문서/메타 파일만 바뀐 push는 빌드하지 않는다 (코드 무관 변경).
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"

env:
  # Node.js 20 deprecation 경고 해소: actions/checkout@v4 등이 Node.js 24로 실행되도록 강제
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # 체크 잡: 포맷, 린트, 테스트, 커버리지를 MSRV(1.78)와 stable 매트릭스에서 수행
  # MSRV 1.78: Cargo.lock v4 포맷을 읽으려면 Cargo 1.78+ 필요
  check:
    name: Check (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.78", "stable"]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy, llvm-tools-preview

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

      # cargo-llvm-cov 는 stable 에서만 실행 (MSRV 1.78 에서는 coverage 도구 미지원 가능성)
      - name: Install cargo-llvm-cov
        if: matrix.rust == 'stable'
        uses: taiki-e/install-action@cargo-llvm-cov

      # 라인 커버리지 70% 미만이면 실패 (Requirement 16.5)
      - name: cargo llvm-cov (fail under 70%)
        if: matrix.rust == 'stable'
        run: cargo llvm-cov --all-features --fail-under-lines 70

  # 의존성 취약점 감사 잡: cargo audit 직접 실행 (.cargo/audit.toml의 ignore 목록 참조)
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
